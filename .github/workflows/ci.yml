name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2.9.1

      - name: cargo build
        run: cargo build --verbose

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: explicit RuleSpec root adversarial tests
        run: >-
          cargo test
          --test exclusive_root_resolution
          --test composed_compile
          --verbose

      - name: cargo test
        run: cargo test --verbose

      # Schema generation lives behind the non-default `schema` feature so
      # pure-runtime consumers stay lean. These tests regenerate the published
      # JSON Schemas and assert the checked-in `schemas/` copies are current
      # (golden-file drift guard), check schema/serde fidelity, and — when a
      # rulespec-us checkout is present — validate the corpus. The conformance
      # test self-skips here, where no checkout exists.
      - name: cargo test (schema feature)
        run: cargo test --features schema --verbose

      - name: cargo build --release
        run: cargo build --release --verbose

      # The PyO3 extension is a separate crate that CI otherwise never
      # compiles — a core enum change once broke it silently (the
      # DenseColumn::Float arm). Type-check it on every run. `cargo check`
      # never links, so the macOS extension-module link is guarded separately
      # by the `python-ext-macos` job below.
      - name: cargo check (python-ext)
        run: cargo check --manifest-path python-ext/Cargo.toml --verbose

  rust-macos:
    name: Rust build + tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2.9.1

      - name: cargo build
        run: cargo build --verbose

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: explicit RuleSpec root adversarial tests
        run: >-
          cargo test
          --test exclusive_root_resolution
          --test composed_compile
          --verbose

      - name: cargo test
        run: cargo test --verbose

      - name: cargo test (schema feature)
        run: cargo test --features schema --verbose

      - name: cargo build --release
        run: cargo build --release --verbose

      - name: cargo check (python-ext)
        run: cargo check --manifest-path python-ext/Cargo.toml --verbose

  python-ext-macos:
    name: PyO3 extension build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: python-ext

      # Guards issue #92. The `extension-module` cdylib leaves the Python
      # C-API symbols undefined at link time; on macOS the linker rejects them
      # unless it gets `-undefined dynamic_lookup`, which python-ext/build.rs
      # emits (pyo3 0.27 no longer auto-emits them). Unlike the Linux
      # `cargo check` above, `cargo build` actually links the cdylib, so a
      # regression in that link setup fails CI here instead of only surfacing
      # in a developer's local `cargo build` / `maturin develop`.
      - name: cargo build (python-ext extension-module cdylib)
        run: cargo build --manifest-path python-ext/Cargo.toml --verbose

  wasm:
    name: wasm32 core check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2.9.1

      - name: cargo check (wasm32-unknown-unknown, no default features)
        run: cargo check --target wasm32-unknown-unknown --no-default-features --verbose

  wasm-pkg:
    name: wasm bindings package + node smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: wasm

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: wasm-pack build (nodejs)
        run: wasm-pack build wasm --target nodejs --out-dir pkg-node

      - name: wasm-pack build (web)
        run: wasm-pack build wasm --target web --out-dir pkg-web

      - name: Node smoke test
        run: node wasm/test/smoke.mjs

  python:
    name: Python package tests
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Create Python environment and install package
        run: |
          uv venv --python 3.14 .venv
          uv pip install --python .venv/bin/python -e python/
          uv pip install --python .venv/bin/python pytest maturin==1.14.1

      - name: Build and install native dense extension
        run: .venv/bin/maturin develop --manifest-path python-ext/Cargo.toml

      - name: Verify native dense extension import
        run: .venv/bin/python -c "import axiom_rules_engine_dense"

      - name: Run Python tests
        run: .venv/bin/python -m pytest -q python/tests
