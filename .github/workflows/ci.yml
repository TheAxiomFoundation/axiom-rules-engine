name: CI

on:
  push:
    branches: [main, release/v0.1]
  pull_request:
    branches: [main, release/v0.1]

jobs:
  rust:
    name: Rust build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2.9.1

      - name: cargo build
        run: cargo build --verbose

      - name: cargo test
        run: cargo test --verbose

      # Schema generation lives behind the non-default `schema` feature so
      # pure-runtime consumers stay lean. These tests regenerate the published
      # JSON Schemas and assert the checked-in `schemas/` copies are current
      # (golden-file drift guard), check schema/serde fidelity, and — when a
      # rulespec-us checkout is present — validate the corpus. The conformance
      # test self-skips here, where no checkout exists.
      - name: cargo test (schema feature)
        run: cargo test --features schema --verbose

      - name: cargo build --release
        run: cargo build --release --verbose

      # The PyO3 extension is a separate crate that CI otherwise never
      # compiles — a core enum change once broke it silently (the
      # DenseColumn::Float arm). Type-check it on every run.
      - name: cargo check (python-ext)
        run: cargo check --manifest-path python-ext/Cargo.toml --verbose

  wasm:
    name: wasm32 core check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2.9.1

      - name: cargo check (wasm32-unknown-unknown, no default features)
        run: cargo check --target wasm32-unknown-unknown --no-default-features --verbose

  wasm-pkg:
    name: wasm bindings package + node smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: wasm

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: wasm-pack build (nodejs)
        run: wasm-pack build wasm --target nodejs --out-dir pkg-node

      - name: wasm-pack build (web)
        run: wasm-pack build wasm --target web --out-dir pkg-web

      - name: Node smoke test
        run: node wasm/test/smoke.mjs

  python:
    name: Python package tests
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e python/
          python -m pip install pytest pyyaml pydantic rich

      - name: Run Python tests
        run: python -m pytest -q python/tests
