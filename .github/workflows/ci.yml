name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2.9.1

      - name: cargo build
        run: cargo build --verbose

      - name: cargo test
        run: cargo test --verbose

      - name: cargo build --release
        run: cargo build --release --verbose

  wasm:
    name: wasm32 core check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2.9.1

      - name: cargo check (wasm32-unknown-unknown, no default features)
        run: cargo check --target wasm32-unknown-unknown --no-default-features --verbose

  python:
    name: Python package tests
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e python/
          python -m pip install pytest pyyaml pydantic rich

      - name: Run Python tests
        run: python -m pytest -q python/tests
