# Config for dist 0.31.0.
[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = []
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# Checksums to generate for each App
checksum = "sha256"
# Whether to enable GitHub Attestations
github-attestations = true
# The generated release.yml is intentionally hand-hardened (tag-injection fix,
# per-job least-privilege permissions, SHA-pinned actions, checksum-verified
# installer, offline locked builds) — security patches cargo-dist cannot express
# in config. allow-dirty tells dist not to fail its CI-consistency check on those
# edits; the patches are documented at the top of release.yml for re-application
# after any `dist init` regeneration.
allow-dirty = ["ci"]
